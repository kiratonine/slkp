version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: s1lk-x402-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: s1lk_x402_bridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: